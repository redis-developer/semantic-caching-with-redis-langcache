name: semantic-caching-with-redis-langcache
services:
  redis:
    image: "redis:alpine"
    ports:
      - 6379:6379
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-data:/data

  server:
    build: .
    ports:
      - "${PORT-8080}:${PORT-8080}"
    env_file:
      - .env
    environment:
      APP_ENV: production
      REDIS_URL: ${REDIS_URL:-"redis://redis:6379"}
    restart: always
    depends_on:
      - redis

volumes:
  redis-data:
