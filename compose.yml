name: semantic-caching-with-redis-langcache
services:
  redis:
    image: "redis:alpine"
    ports:
      - 6379:6379
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-data:/data

  server:
    build: .
    ports:
      - "${PORT-8080}:${PORT-8080}"
    environment:
      APP_ENV: ${APP_ENV-production}
      LOG_LEVEL: ${LOG_LEVEL-INFO}
      LOG_STREAM_KEY: ${LOG_STREAM_KEY-logs}
      PORT: ${PORT-8080}
    env_file:
      - .env.docker
    restart: always
    depends_on:
      - redis

volumes:
  redis-data:
